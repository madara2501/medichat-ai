<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediChat - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            text-align: center;
        }
        .logo {
            font-size: 42px;
            color: #0ea5e9;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #0284c8;
        }
        .toggle-link {
            margin-top: 15px;
            color: #0ea5e9;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fa-solid fa-heart-pulse"></i>
        </div>
        <h1>MediChat</h1>
        <p>AI Healthcare Assistant</p>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="/login">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <a href="/forgot_password"
               style="
               display:block;
               margin-top:15px;
               color:#2563eb;
               text-decoration:none;
             ">
              Forgot Password?
            </a>
        </form>

        <p class="toggle-link" onclick="toggleForm()">Don't have an account? Register</p>

        <!-- Register Form (Hidden by default) -->
        <form id="registerForm" method="POST" action="/register" style="display: none;">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit">Register</button>
        </form>

        <p class="toggle-link" onclick="toggleForm()" id="registerToggle" style="display: none;">Already have an account? Login</p>
    </div>

    <script>
        function toggleForm() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginToggle = document.querySelector('.toggle-link');
            const registerToggle = document.getElementById('registerToggle');

            if (loginForm.style.display !== 'none') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginToggle.style.display = 'none';
                registerToggle.style.display = 'block';
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginToggle.style.display = 'block';
                registerToggle.style.display = 'none';
            }
        }
    </script>
</body>
</html>
