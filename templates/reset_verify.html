<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - MediChat</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:420px;
            background:white;
            padding:40px;
            border-radius:22px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }
           h2{
            color:#0f172a;
            margin-bottom:12px;
            text-align:center;
        }

        p{
            color:#64748b;
            text-align:center;
            margin-bottom:25px;
            line-height:1.6;
            font-size:15px;
        }

        input{
            width:100%;
            padding:15px;
            border-radius:12px;
            border:1px solid #cbd5e1;
            margin-bottom:18px;
            font-size:15px;
            outline:none;
            text-align:center;
            letter-spacing:3px;
        }

        input:focus{
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body> 

     <div class="container">

        <h2>OTP Verification</h2>

        <p>
            Enter the 6-digit OTP sent to your email.
            This code expires in 5 minutes.
        </p>

        <form method="POST">

            <input
                type="text"
                name="otp"
                placeholder="Enter OTP"
                required
            >

            <button type="submit">
                Verify OTP
            </button>

        </form>

    </div>

</body>
</html>
